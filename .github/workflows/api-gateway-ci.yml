name: CI/CD API-Gateway

on:
  workflow_dispatch:
  push:
    branches: [develop, main]
    paths:
      - "Api-gateway/**"
      - ".github/workflows/api-gateway-ci.yml"
  pull_request:
    branches: [develop, main]
    paths:
      - "Api-gateway/**"

jobs:
  docker-build-push:
    name: Build & Push imagen Docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
      env_name: ${{ steps.vars.outputs.env_name }}
      image_name: ${{ steps.repo.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Normalizar nombre del repo a minúsculas (ghcr.io lo exige)
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Determinar entorno (qa/prod) y tag según la rama
        id: vars
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV_NAME=prod
          else
            ENV_NAME=qa
          fi
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=${ENV_NAME}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Configurar Docker Buildx (necesario para cache type=gha)
        uses: docker/setup-buildx-action@v3

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push de la imagen
        uses: docker/build-push-action@v6
        with:
          context: ./Api-gateway
          file: ./Api-gateway/dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/api-gateway:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ steps.repo.outputs.name }}/api-gateway:${{ steps.vars.outputs.env_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Desplegar en el clúster K3s
    needs: docker-build-push
    runs-on: self-hosted
    if: github.event_name == 'push'
    environment: ${{ needs.docker-build-push.outputs.env_name }}
    steps:
      - name: Configurar kubectl con el kubeconfig del clúster
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"
      - name: Actualizar imagen en el Deployment
        env:
          NAMESPACE: grupo5-${{ needs.docker-build-push.outputs.env_name }}
        run: |
          kubectl set image deployment/api-gateway \
            api-gateway=ghcr.io/${{ needs.docker-build-push.outputs.image_name }}/api-gateway:${{ needs.docker-build-push.outputs.image_tag }} \
            -n "$NAMESPACE"
          kubectl rollout status deployment/api-gateway -n "$NAMESPACE" --timeout=120s
