name: CI/CD Servicio-Contabilidad

on:
  push:
    branches: [develop, main]
    paths:
      - "Servicio-Contabilidad/**"
  pull_request:
    branches: [develop, main]
    paths:
      - "Servicio-Contabilidad/**"

jobs:
  build-and-test:
    name: Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Servicio-Contabilidad
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: Servicio-Contabilidad/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build 
  docker-build-push:
    name: Build & Push imagen Docker
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Normalizar nombre del repo a minúsculas (ghcr.io lo exige)
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Determinar entorno (qa/prod) y tag según la rama
        id: vars
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV_NAME=prod
          else
            ENV_NAME=qa
          fi
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=${ENV_NAME}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push de la imagen
        uses: docker/build-push-action@v6
        with:
          context: ./Servicio-Contabilidad
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/servicio-contabilidad:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ steps.repo.outputs.name }}/servicio-contabilidad:${{ steps.vars.outputs.env_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Desplegar en el clúster K3s
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Configurar kubectl con el kubeconfig del clúster
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
      - name: Actualizar imagen en el Deployment
        run: echo "Nombre del Deployment"
