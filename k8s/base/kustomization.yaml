apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:

  # ConfigMaps
  - config/configmap-pedido.yaml
  - config/configmap-inventario.yaml
  - config/configmap-contabilidad.yaml

  # Secrets
  - secret/secret-pedido.yaml
  - secret/secret-inventario.yaml
  - secret/secret-contabilidad.yaml

  # Infraestructura
  - kafka.yaml

  # Bases de datos
  - postgres/postgres-pedido.yaml
  - postgres/postgres-inventario.yaml
  - postgres/postgres-contabilidad.yaml

  # Microservicios
  - services/servicio-pedido.yaml
  - services/servicio-inventario.yaml
  - services/servicio-contabilidad.yaml

  # Frontend y API Gateway
  - frontend.yaml
  - gateway.yaml

  # Acceso por dominio (Traefik de k3s)
  - ingress.yaml

  # Respaldos automáticos cada 10 minutos
  - backups.yaml