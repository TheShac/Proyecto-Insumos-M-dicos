apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-gateway

spec:
  replicas: 2

  selector:
    matchLabels:
      app: api-gateway

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: api-gateway
                topologyKey: kubernetes.io/hostname

      containers:
        - name: api-gateway

          image: ghcr.io/theshac/proyecto-insumos-m-dicos/api-gateway:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 80

          env:
            - name: PEDIDOS_PORT
              value: "3001"

            - name: INVENTARIO_PORT
              value: "3002"

            - name: CONTABILIDAD_PORT
              value: "3003"

          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15

---
apiVersion: v1
kind: Service

metadata:
  name: api-gateway

spec:
  selector:
    app: api-gateway

  ports:
    - name: http
      port: 80
      targetPort: http

  type: ClusterIP
