apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicio-inventario

spec:
  replicas: 1

  selector:
    matchLabels:
      app: servicio-inventario

  template:
    metadata:
      labels:
        app: servicio-inventario

    spec:
      containers:
        - name: servicio-inventario

          image: ghcr.io/theshac/proyecto-insumos-m-dicos/servicio-inventario:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 3002

          envFrom:
            - configMapRef:
                name: config-inventario
            - secretRef:
                name: secret-inventario

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"

          # El arranque incluye migraciones + unión al grupo Kafka (~20-30s)
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            failureThreshold: 24

          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: servicio-inventario

spec:
  selector:
    app: servicio-inventario

  ports:
    - name: http
      port: 3002
      targetPort: http

  type: ClusterIP
