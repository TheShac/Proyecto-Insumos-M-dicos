apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicio-contabilidad

spec:
  replicas: 1

  selector:
    matchLabels:
      app: servicio-contabilidad

  template:
    metadata:
      labels:
        app: servicio-contabilidad

    spec:
      containers:
        - name: servicio-contabilidad

          image: ghcr.io/theshac/proyecto-insumos-m-dicos/servicio-contabilidad:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 3003

          envFrom:
            - configMapRef:
                name: config-contabilidad
            - secretRef:
                name: secret-contabilidad

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"

          # El arranque incluye migraciones + unión al grupo Kafka (~20-30s)
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            failureThreshold: 24

          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: servicio-contabilidad

spec:
  selector:
    app: servicio-contabilidad

  ports:
    - name: http
      port: 3003
      targetPort: http

  type: ClusterIP
