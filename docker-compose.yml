version: '3.8'

services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    ports:
      - "9092:9092"  
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: HOST://0.0.0.0:9092,DOCKER://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,HOST:PLAINTEXT,DOCKER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"

  # MySQL × 3 (una BD por servicio) 
  mysql-pedidos:
    image: mysql:8.0
    container_name: mysql-pedidos
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: pedidos_db
    volumes:
      - mysql_pedidos_data:/var/lib/mysql

  mysql-inventario:
    image: mysql:8.0
    container_name: mysql-inventario
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: inventario_db
    volumes:
      - mysql_inventario_data:/var/lib/mysql

  mysql-contabilidad:
    image: mysql:8.0
    container_name: mysql-contabilidad
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: contabilidad_db
    volumes:
      - mysql_contabilidad_data:/var/lib/mysql

  servicio-gestion-pedido:
    build: 
      context: ./Servicio-Gestion-Pedido
    container_name: servicio-gestion-pedido
    depends_on:
      - kafka
      - mysql-pedidos

  servicio-inventario:
    build: 
      context: ./Servicio-Inventario
    container_name: servicio-inventario
    depends_on:
      - kafka
      - mysql-inventario

  servicio-contabilidad:
    build: 
      context: ./Servicio-Contabilidad
    container_name: servicio-contabilidad
    depends_on:
      - kafka
      - mysql-contabilidad

  frontend:
    build: 
      context: ./Frontend
    container_name: frontend
    ports:
      - "3000:3000" # Puerto público para ver la interfaz en localhost:3000

  api-gateway:
    build: 
      context: ./Api-gateway
    container_name: api-gateway
    ports:
      - "80:80" # Tu Gateway recibe el tráfico público principal
    depends_on:
      - servicio-gestion-pedido

volumes:
  kafka_data:
  mysql_pedidos_data:
  mysql_inventario_data:
  mysql_contabilidad_data: